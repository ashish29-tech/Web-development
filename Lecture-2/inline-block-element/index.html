<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  
  <!-- strong vs b -->

  <h1>strong vs b (bold)</h1>

  <!-- inline element -->
  <strong>I am strong</strong>

  <!-- next line m leke jana ho toh br tag ka use karte hai -->
  <br> 

  <!-- inline element -->
  <b>I am bold</b>


  <!-- ----------------------------------------------------- -->
  <h2>em vs i</h2>

  <!-- em and i are also inline tag -->
   <!-- dikhne m em and i ek jaisa hota hai but em tag us particular chiz pe emphasis karta hai -->
  <em>hi I am em tag</em>
  <!-- i: idiomatic. Web reader jab ise padhega toh koi fark nai ayega...dikhne m alag rahega -->
  <i>Hi I am i tag </i>

</body>
</html>
