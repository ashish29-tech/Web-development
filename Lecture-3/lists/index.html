<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>

  <h1>Lists</h1>

  <h2>Ordered list</h2>

  <!-- type is attribute. This attribute provides extra information to the browser about that specific element. -->
  <!-- <ol type="a"> -->
  <ol type="a" start="3">
    <li>Ashish</li>
    <li>Ranjan</li>
    <li>John</li>
    <li>Learner</li>
  </ol>

  <ol type="I">
    <li>Samosa</li>
    <li>Momos</li>
    <li>Pizza</li>
    <li>Burger</li>
  </ol>

  <!-- start will always accept a numeric value -->
  <ol type="1" start="5">
    <li>Kya</li>
    <li>haal</li>
    <li>chal</li>
    <li>bhai</li>
    <li>tere ?</li>
  </ol>

  <!-- unordered list -->

  <h2>Unordered list</h2>
  <ul>
    <li>Gangs of wasseypur</li>
    <li>Dhol</li>
    <li>Tere Naam</li>
    <li>Main Hoon Na</li>
  </ul>

</body>
</html>
