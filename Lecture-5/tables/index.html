<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Table</title>
</head>
<body>  

  <!-- table naam ka tag -->
  <table align="center" border="15" bgcolor="lightgrey" cellspacing="10" cellpadding="10" >
    <thead>
      <tr>
        <!-- table column ke 2 tarike...td ya th -->
         <!--th m jo likha hai wo bold aa rha hai  -->
         <th>Days/period</th>
         <!-- <td>Monday</td> -->
         <th>Monday</th>
         <th>Tuesday</th>
         <th>Wednesday</th>
         <th>Thursday</th>
         <th>Friday</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <th>1</th>
        <td colspan="2">English</td>
        <!-- <td>Hindi</td> -->
        <td rowspan="6">SST</td>
        <td>Science</td>
        <td>Games</td>
      </tr>

      <tr>
        <th>2</th>
        <td>English</td>
        <td>Lab</td>
        <!-- <td>SST</td> -->
        <td>Science</td>
        <td>Games</td>
      </tr>

      <tr>
        <th>3</th>
        <td>English</td>
        <td>GK</td>
        <!-- <td>SST</td> -->
        <td>Science</td>
        <td>Games</td>
      </tr>

      <tr>
        <td>4</td>
        <td>Computer</td>
        <td>Hindi</td>
        <!-- <td>SST</td> -->
        <td>Science</td>
        <td>Games</td>
      </tr>

      <tr>
        <td>5</td>
        <td>Prayer</td>
        <td>Hindi</td>
        <!-- <td>SST</td> -->
        <td>Science</td>
        <td>Games</td>
      </tr>

    </tbody>
    <tfoot>
      <tr>
        <!-- colspan attribute hai -->
        <!--ek hi column m aa rha hai...hame 6 column m chahiye tha -->
        <th colspan="6">This time table is for class 9th</th>
      </tr>
    </tfoot>

  </table>
  
</body>
</html>
