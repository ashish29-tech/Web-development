<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  
  <h1>inputs</h1>

  <!-- type, name and id are all attributes. -->
  <!-- <input type="text" name="" id=""> -->

  Name:
  <!-- type kya hai means what kind of value is it accepting. Text ko accept kar raha hai. -->
  <input type="text">

  <hr>

  Password:
  <!-- jo input hoga apne andar password type ki value lega -->
  <input type="password">

  <hr>

  Email:
  <input type="email">

  <hr>

  tel:
  <input minlength="0" maxlength="10" type="tel">

  <hr>

  number:
  <input min="0" max="10" type="number">

  <hr>

  date:
  <input type="date">

  <hr>

  color:
  <input type="color">

  <hr>

  <input type="file">

  <hr>

  <input type="checkbox">

</body>
</html>
